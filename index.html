<html lang="nl">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1c1a">
    <!-- Note: add icons if needed -->
</head>
<body>
    <!-- Background Decor -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-overlay"></div>

    <div id="app-container">
        
        <!-- ==================== HOME SCREEN ==================== -->
        <main id="home-screen" class="screen active fade-in relative">
            <div class="home-content">
                <div class="logo-container">
                    <h1 class="klub-title">Café<br>de Gouwe</h1>
                    <p class="subtitle">Wat heb je zin in vandaag?</p>
                </div>
                
                <button id="start-btn" class="btn btn-primary">Start Keuzewijzer</button>
            </div>
            <div class="footer">Alphen aan den Rijn ・ Gezelligheid Kent Geen Tijd</div>
        </main>

        <!-- ==================== QUIZ SCREEN ==================== -->
        <main id="quiz-screen" class="screen hidden">
            <div class="quiz-header">
                <div class="progress-info">
                    <span>Vraag <span id="current-q-num">1</span></span>
                </div>
                <!-- Adding a minimalist progress bar -->
            </div>

            <div class="question-wrapper">
                <h2 id="question-text" class="question-text">Vraag hier?</h2>
                <div id="options-container" class="options-grid">
                    <!-- Options injected by JS -->
                </div>
            </div>

            <div class="quiz-footer" style="justify-content: center;">
                <button id="back-btn" class="btn btn-outline" style="max-width: 200px;">← Terug</button>
            </div>
        </main>

        <!-- ==================== RESULT SCREEN ==================== -->
        <main id="result-screen" class="screen hidden">
            <div class="result-header">
                <div id="result-emoji" class="result-emoji">🍽️</div>
                <h2 class="result-title">Jouw Perfecte Keuze</h2>
            </div>
            
            <div class="winner-card glass-panel">
                <span id="winner-price" class="drink-price"></span>
                <div class="winner-image-container">
                    <img id="winner-image" src="" alt="Menu Item" />
                </div>
                
                <div class="winner-main">
                    <h1 id="winner-name" class="drink-name">Item Naam</h1>
                    
                    <div class="why-fits">
                        <h3>✨ Waarom dit bij jou past:</h3>
                        <p id="winner-reason">Omdat je trek hebt.</p>
                    </div>
                </div>
            </div>

            <div class="cta-section fade-in-delayed">
                <p class="cta-text">Bestel dit bij onze bediening!</p>
                <div class="action-buttons">
                    <button id="restart-btn" class="btn btn-outline">Probeer Opnieuw ↺</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
